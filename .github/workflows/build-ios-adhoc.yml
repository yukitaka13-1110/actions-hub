name: iOS Ad-Hoc Build

on:
  workflow_dispatch:
    inputs:
      repo:
        required: true
      ref:
        required: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          repository: yukitaka13-1110/${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.POKER_UI_POC_PAT }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod init
          pod install --repo-update

      - name: Install Apple certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Verify signing
        run: security find-identity -v -p codesigning

      - name: Build iOS (Ad-Hoc)
        run: >
          flutter build ipa --release
          --export-options-plist=ios/ExportOptions.plist

      - name: Upload to Diawi
        env:
          DIAWI_TOKEN: ${{ secrets.DIAWI_TOKEN }}
        run: |
          set +x
          IPA_PATH=$(ls build/ios/ipa/*.ipa)

          RESPONSE=$(curl -s https://upload.diawi.com/ \
            -F "token=${DIAWI_TOKEN}" \
            -F "file=@${IPA_PATH}" \
            -F "wall_of_apps=0" \
            -F "find_by_udid=0" \
            -F "comment=Branch: ${{ inputs.ref }}")

          JOB=$(echo "$RESPONSE" | jq -r '.job')

          for i in $(seq 1 30); do
            STATUS_RESPONSE=$(curl -s "https://upload.diawi.com/status?token=${DIAWI_TOKEN}&job=${JOB}")
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            if [ "$STATUS" = "2000" ]; then
              LINK=$(echo "$STATUS_RESPONSE" | jq -r '.link')
              echo "## Diawi Install Link" >> $GITHUB_STEP_SUMMARY
              echo "$LINK" >> $GITHUB_STEP_SUMMARY
              break
            fi
            sleep 2
          done
