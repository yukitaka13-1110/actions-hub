name: iOS Ad-Hoc Build

on:
  workflow_dispatch:
    inputs:
      repo:
        required: true
      ref:
        required: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          repository: yukitaka13-1110/${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.POKER_UI_POC_PAT }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod init
          pod install --repo-update

      - name: Install Apple certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Verify signing
        run: security find-identity -v -p codesigning

      - name: Build iOS (Ad-Hoc)
        run: >
          flutter build ipa --release
          --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA to Release
        env:
          GH_TOKEN: ${{ secrets.POKER_UI_POC_PAT }}
        run: |
          IPA_PATH=$(ls build/ios/ipa/*.ipa)
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" "$IPA_PATH" \
            --repo yukitaka13-1110/poker_ui_poc \
            --title "iOS Ad-Hoc Build $TAG" \
            --notes "Branch: ${{ inputs.ref }}" \
            --prerelease
